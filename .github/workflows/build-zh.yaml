name: Build (Chinese)

on:
  workflow_dispatch:
    inputs:
      dev-build:
        description: 'Development build'
        required: true
        type: boolean
        default: true
  push:
    branches: [main, master]
    paths-ignore:
      - docs/**
      - '**.md'

permissions:
  contents: read

jobs:
  get-project-version:
    runs-on: ubuntu-latest
    name: Get project version
    outputs:
      cmake-project-version: ${{ steps.project-version.outputs.cmake-project-version }}
      project-version: ${{ steps.project-version.outputs.project-version }}
      project-version-unfiltered: ${{ steps.project-version.outputs.project-version-unfiltered }}
      build-timestamp: ${{ steps.project-version.outputs.build-timestamp }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            CMakeLists.txt
          sparse-checkout-cone-mode: false

      - name: Get project version
        id: project-version
        shell: bash
        run: |
          if [ ${{ inputs.dev-build }} = true ]; then
            export PROJ_VER="v$(sed -nr "s/project\(Ymir\s+VERSION\s+(\S+)\)/\1/p" CMakeLists.txt)-zh+${GITHUB_SHA::8}"
          else
            export PROJ_VER="${GITHUB_REF_NAME}"
          fi
          echo "cmake-project-version=$(sed -nr "s/project\(Ymir\s+VERSION\s+(\S+)\)/\1/p" CMakeLists.txt)" >> "$GITHUB_OUTPUT"
          echo "project-version=${PROJ_VER//+/_}" >> "$GITHUB_OUTPUT"
          echo "project-version-unfiltered=${PROJ_VER}" >> "$GITHUB_OUTPUT"
          echo "build-timestamp=$(date +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  build-windows:
    name: windows-${{ matrix.architecture.name }}
    runs-on: ${{ matrix.architecture.runner }}
    needs: [get-project-version]

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        c_compiler: [clang]
        architecture:
          - name: "x86_64-SSE2"
            enable_avx2_option: "OFF"
            runner: windows-latest
            target: x64
            vcpkg_triplet: x64-win-llvm-static-md
        include:
          - c_compiler: clang
            cpp_compiler: clang

    steps:
      - uses: glslang/setup-masm@v1

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          export BUILD_VERSION=${{ needs.get-project-version.outputs.project-version }}
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "ymir-artifact-name=ymir-windows-${{ matrix.architecture.name }}-${BUILD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bootstrap vcpkg
        shell: pwsh
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: windows-${{ matrix.architecture.name }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-triplets/**') }}

      - name: Configure CMake
        env:
          CXX: ${{ matrix.cpp_compiler }}
          CC: ${{ matrix.c_compiler }}
          VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_cache,readwrite'
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.architecture.vcpkg_triplet }}
          -DBUILD_SHARED_LIBS=OFF
          -DYmir_AVX2=${{ matrix.architecture.enable_avx2_option }}
          -DYmir_ENABLE_IPO=ON
          -DYmir_ENABLE_DEVLOG=OFF
          -DYmir_ENABLE_IMGUI_DEMO=OFF
          -DYmir_ENABLE_UPDATE_CHECKS=ON
          -DYmir_ENABLE_SANDBOX=OFF
          -DYmir_ENABLE_YMDASM=OFF
          -DYmir_ENABLE_TESTS=OFF
          -DYmir_EXTRA_INLINING=ON
          -DYmir_VERSION_BUILD=${{ needs.get-project-version.outputs.project-version }}
          -DYmir_BUILD_TIMESTAMP=${{ needs.get-project-version.outputs.build-timestamp }}
          -DYmir_DEV_BUILD=${{ inputs.dev-build && 'ON' || 'OFF' }}
          -DYmir_LIBRARY_ONLY=OFF
          -S ${{ github.workspace }}
          -G Ninja

      - name: Build
        env:
          CXX: ${{ matrix.cpp_compiler }}
          CC: ${{ matrix.c_compiler }}
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --parallel

      - name: Get gamecontrollerdb.txt
        uses: actions/checkout@v4
        with:
          repository: mdqinc/SDL_GameControllerDB
          sparse-checkout: |
            gamecontrollerdb.txt
            LICENSE
          sparse-checkout-cone-mode: false
          path: gcdb

      - name: Package Ymir artifact
        run: |
          $licensesDir = Join-Path (Get-Location) "licenses"
          New-Item -ItemType Directory -Force -Path $licensesDir | Out-Null
          Get-ChildItem -Recurse -Path "${{ steps.strings.outputs.build-output-dir }}\vcpkg_installed" -Filter copyright |
            ForEach-Object {
              $port = Split-Path $_.DirectoryName -Leaf
              $dest = Join-Path $licensesDir "$port-LICENSE.txt"
              Copy-Item $_.FullName $dest -Force
            }

          Copy-Item -Path ".\apps\ymir-sdl3\res\licenses\*"                     -Destination "$licensesDir\"  -Recurse
          Copy-Item -Path ".\vendor\concurrentqueue\concurrentqueue\LICENSE.md" -Destination "$licensesDir\concurrentqueue-LICENSE.md"
          Copy-Item -Path ".\vendor\imgui\imgui\LICENSE.txt"                    -Destination "$licensesDir\imgui-LICENSE.txt"
          Copy-Item -Path ".\vendor\libchdr\libchdr\LICENSE.txt"                -Destination "$licensesDir\libchdr-LICENSE.txt"
          Copy-Item -Path ".\vendor\libchdr\libchdr\deps\lzma-25.01\LICENSE"    -Destination "$licensesDir\lzma-LICENSE"
          Copy-Item -Path ".\vendor\lz4\lz4\lib\LICENSE"                        -Destination "$licensesDir\lz4-LICENSE"
          Copy-Item -Path ".\vendor\mio\LICENSE"                                -Destination "$licensesDir\mio-LICENSE"
          Copy-Item -Path ".\vendor\xxHash\xxHash\LICENSE"                      -Destination "$licensesDir\xxHash-LICENSE"
          Copy-Item -Path ".\LICENSE"                                           -Destination "$licensesDir\Ymir-LICENSE"
          Copy-Item -Path "${{ github.workspace }}\gcdb\LICENSE"                -Destination "$licensesDir\SDL_GameControllerDB-LICENSE"
          Copy-Item -Path "${{ github.workspace }}\gcdb\gamecontrollerdb.txt"   -Destination ".\gamecontrollerdb.txt"
          Compress-Archive -Path "README.md","CHANGELOG.md","TROUBLESHOOTING.md","gamecontrollerdb.txt","$licensesDir/","build/apps/ymir-sdl3/ymir-sdl3.exe" -DestinationPath "${{ steps.strings.outputs.ymir-artifact-name }}.zip"

      - name: Upload Ymir artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.strings.outputs.ymir-artifact-name }}
          path: ${{ steps.strings.outputs.ymir-artifact-name }}.zip

  build-linux:
    name: linux-${{ matrix.architecture.name }}
    runs-on: ${{ matrix.architecture.runner }}
    needs: [get-project-version]

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        compiler: [clang]
        architecture:
          - name: "x86_64-SSE2"
            enable_avx2_option: "OFF"
            runner: ubuntu-24.04
        include:
          - compiler: clang
            c_compiler: "clang-18"
            cpp_compiler: "clang++-18"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          export BUILD_VERSION=${{ needs.get-project-version.outputs.project-version }}
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "ymir-artifact-name=ymir-linux-${{ matrix.architecture.name }}-${BUILD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install build-essential git make pkg-config \
            cmake ninja-build gnome-desktop-testing \
            libasound2-dev libpulse-dev libaudio-dev \
            libjack-dev libsndio-dev libx11-dev \
            libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev \
            libxtst-dev libxkbcommon-dev libdrm-dev \
            libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
            libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev \
            libudev-dev mono-complete libltdl-dev clang-18 \
            autoconf autoconf-archive automake

      - name: Bootstrap vcpkg
        shell: bash
        run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          key: linux-${{ matrix.architecture.name }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-triplets/**') }}

      - name: Configure CMake
        env:
          VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_cache,readwrite'
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          -DBUILD_SHARED_LIBS=OFF
          -DYmir_AVX2=${{ matrix.architecture.enable_avx2_option }}
          -DYmir_ENABLE_IPO=ON
          -DYmir_ENABLE_DEVLOG=OFF
          -DYmir_ENABLE_IMGUI_DEMO=OFF
          -DYmir_ENABLE_UPDATE_CHECKS=ON
          -DYmir_ENABLE_SANDBOX=OFF
          -DYmir_ENABLE_YMDASM=OFF
          -DYmir_ENABLE_TESTS=OFF
          -DYmir_EXTRA_INLINING=ON
          -DYmir_VERSION_BUILD=${{ needs.get-project-version.outputs.project-version }}
          -DYmir_BUILD_TIMESTAMP=${{ needs.get-project-version.outputs.build-timestamp }}
          -DYmir_DEV_BUILD=${{ inputs.dev-build && 'ON' || 'OFF' }}
          -DYmir_LIBRARY_ONLY=OFF
          -S ${{ github.workspace }}
          -G Ninja

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --parallel

      - name: Get gamecontrollerdb.txt
        uses: actions/checkout@v4
        with:
          repository: mdqinc/SDL_GameControllerDB
          sparse-checkout: |
            gamecontrollerdb.txt
            LICENSE
          sparse-checkout-cone-mode: false
          path: gcdb

      - name: Package artifacts
        run: |
          mkdir -p licenses
          find "${{ steps.strings.outputs.build-output-dir }}/vcpkg_installed" -type f -path "*/share/*/copyright" | while read -r file; do
            port=$(basename "$(dirname "$file")")
            cp "$file" "licenses/${port}-LICENSE.txt"
          done
          cp -Rf apps/ymir-sdl3/res/licenses/*                    ./licenses/
          cp -f vendor/concurrentqueue/concurrentqueue/LICENSE.md licenses/concurrentqueue-LICENSE.md
          cp -f vendor/imgui/imgui/LICENSE.txt                    licenses/imgui-LICENSE.txt
          cp -f vendor/libchdr/libchdr/LICENSE.txt                licenses/libchdr-LICENSE.txt
          cp -f vendor/libchdr/libchdr/deps/lzma-25.01/LICENSE    licenses/lzma-LICENSE
          cp -f vendor/lz4/lz4/lib/LICENSE                        licenses/lz4-LICENSE
          cp -f vendor/mio/LICENSE                                licenses/mio-LICENSE
          cp -f vendor/xxHash/xxHash/LICENSE                      licenses/xxHash-LICENSE
          cp -f LICENSE                                           licenses/Ymir-LICENSE
          cp -f ${{ github.workspace }}/gcdb/LICENSE              licenses/SDL_GameControllerDB-LICENSE
          cp -f ${{ github.workspace }}/gcdb/gamecontrollerdb.txt gamecontrollerdb.txt
          tar cJvfh ${{ steps.strings.outputs.ymir-artifact-name }}.tar.xz README.md CHANGELOG.md TROUBLESHOOTING.md gamecontrollerdb.txt licenses/ -C build/apps/ymir-sdl3 ymir-sdl3

      - name: Upload Ymir artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.strings.outputs.ymir-artifact-name }}
          path: ${{ steps.strings.outputs.ymir-artifact-name }}.tar.xz
